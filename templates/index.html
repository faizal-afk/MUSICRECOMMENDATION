<!DOCTYPE html>
<html>
<head>

<title>AI-Powered Music Recommendation System</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>🎵 AI-Powered Music Recommendation System</h1>

<form method="POST">

<textarea
name="lyrics"
placeholder="Enter lyrics, mood, genre or keywords..."
required>
</textarea>

<br><br>

<button type="submit">
Recommend Songs
</button>

</form>

<br>

{% for song in recommendations %}

<div class="card">

<h2>{{ song.song }}</h2>

<p>🎤 {{ song.artist }}</p>

<p>🎼 Genre: {{ song.genre }}</p>

<p>😊 Mood: {{ song.mood }}</p>

<p>🎯 Match Score: {{ song.score }}%</p>

<br>

<a href="{{ song.spotify }}" target="_blank">
🎵 Spotify
</a>

&nbsp;&nbsp;&nbsp;

<a href="{{ song.youtube }}" target="_blank">
▶️ YouTube
</a>

</div>

{% endfor %}

</div>

</body>
</html>
